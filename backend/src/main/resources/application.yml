spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5438}/${DB_NAME:mcq_db}
    username: ${DB_USERNAME:mcq_user}
    password: ${DB_PASSWORD:mcq_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:aVeryLongSecretKeyForJwtTokenGenerationThatIsAtLeast256BitsLongForHS512Algorithm2024}
    expiration-ms: ${JWT_EXPIRATION:86400000}

  exam:
    total-duration-seconds: 1200
    per-question-seconds: 30
    max-attempts-per-paper: 10
    questions-per-paper: 40

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.piriven.mcq: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}
