version: "3.8"

# Frontend-only compose. Host VPS nginx reverse-proxies to this container.
# Host port is configurable so it doesn't clash with the VPS nginx on :80.
#   docker compose up -d --build
#   FRONTEND_PORT=5173 docker compose up -d --build   # override if 4200 busy

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: piriven-frontend:latest
    container_name: mcq-frontend
    ports:
      - "4200:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
